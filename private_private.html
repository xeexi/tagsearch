    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

    color: #f0f0f0;

  /* 凡例 */

    align-self: center;
    gap: 10px;
    margin-bottom: 25px;
    font-size: 0.8em;
    color: #ccc;

  .legend-bar {

    height: 16px;

      hsl(60,95%,50%),
      hsl(30,95%,50%),

    overflow: auto;
    flex: 1;
    min-height: 0;
  }
  table {

    table-layout: fixed;
    border-collapse: separate;
    border-spacing: 0;

  th, td {

    text-align: center;
    vertical-align: middle;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

    color: #b0b0d0;
    font-weight: 500;
    font-size: calc(6px + 0.4vw);
    position: sticky;
  }
  thead th {
    top: 0;
    z-index: 10;
  }
  /* 行ヘッダー */
  th.row-header {
    background: #2e2e4a;
    position: sticky;
    left: 0;
    z-index: 5;
    min-width: 60px;
  }
  /* 左上角 */
  thead th:first-child {
    z-index: 15;
    left: 0;
  }

  /* データセル */
  td {
    font-size: calc(6px + 0.35vw);
    cursor: default;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }
  td.has-data {
    cursor: pointer;
    color: #fff;
    font-weight: 600;
    text-shadow:
      0 0 4px rgba(0,0,0,0.9),
      0 0 8px rgba(0,0,0,0.7),
      0 1px 2px rgba(0,0,0,0.9);
  }
  td.has-data:hover {
    transform: scale(1.05);
    box-shadow: 0 0 12px rgba(255,255,255,0.3);
    z-index: 3;
  }
  td.no-data {
    color: rgba(255,255,255,0.25);
  }

  #tooltip {
    display: none;
    position: fixed;
    z-index: 1000;
    background: rgba(20, 20, 40, 0.97);
    border: 1px solid rgba(255,255,255,0.15);
    border-radius: 8px;
    padding: 12px 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);

    pointer-events: none;

    color: #f8f8f8;
    margin-bottom: 2px;
  }

    margin-bottom: 8px;
  }

    padding: 0;
  }

    font-size: 0.9em;
    color: #ddd;
  }

  }

  #overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; width: 100%; height: 100%;

  }
</style>

// ヒートマップ色計算（青→赤の虹色）
function heatColor(val, minV, maxV) {
  if (val <= 0) return 'transparent';
  // 対数スケール
  const logMin = Math.log(Math.max(minV, 1));
  const logMax = Math.log(Math.max(maxV, 1));
  const logVal = Math.log(Math.max(val, 1));
  let t = (logMax > logMin) ? (logVal - logMin) / (logMax - logMin) : 0;
  t = Math.max(0, Math.min(1, t));
  // hue: 240(青) → 0(赤)
  const hue = 240 - t * 240;
  const sat = 85 + t * 15;
  const light = 35 + (1 - Math.abs(t - 0.5) * 2) * 15;
  return `hsl(${hue}, ${sat}%, ${light}%)`;
}

      const display = raw || '-';
      const num = (display === '-') ? 0 : parseInt(display);
      const isEmpty = (display === '-' || num === 0);
      const bg = isEmpty ? 'transparent' : heatColor(num, minVal, maxVal);
      const cls = isEmpty ? 'no-data' : 'has-data';
      bodyHtml += `<td class="${cls}" style="background:${bg}" data-t1="${t1}" data-t2="${t2}" data-val="${display}">${display === '-' ? '-' : display + '件'}</td>`;
    }
  }
  bodyHtml += '</tr>';
}
bodyHtml += '</tbody>';
table.innerHTML = headerHtml + bodyHtml;

// Tooltip
const tooltip = document.getElementById('tooltip');
const ttTitle = tooltip.querySelector('.tt-title');
const ttUl = tooltip.querySelector('ul');

document.addEventListener('mouseover', function(e) {
  const cell = e.target.closest('td.data');
  if (!cell || cell.classList.contains('empty')) {
    tooltip.style.display = 'none';
    return;
  }
  const t1 = cell.dataset.t1;
  const t2 = cell.dataset.t2;
  const key = t1 + '|' + t2;
  const bookTitles = titlesData[key];
  if (!bookTitles) {
    tooltip.style.display = 'none';
    return;
  }
  ttTitle.textContent = '\u300C' + t1 + '\u300D\u3000\u00D7\u3000\u300C' + t2 + '\u300D';
  ttUl.innerHTML = bookTitles.map(t => `<li>${t}</li>`).join('');
  tooltip.style.display = 'block';
  positionTooltip(e);
});

document.addEventListener('mousemove', function(e) {
  if (tooltip.style.display === 'block') positionTooltip(e);
});

document.addEventListener('mouseout', function(e) {
  const cell = e.target.closest('td.data');
  if (cell) {
    const related = e.relatedTarget;
    if (!related || !related.closest || related.closest('td.data') !== cell) {
      tooltip.style.display = 'none';
    }
  }
});

function positionTooltip(e) {
  const pad = 12;
  let x = e.clientX + pad;
  let y = e.clientY + pad;
  const tw = tooltip.offsetWidth;
  const th = tooltip.offsetHeight;
  if (x + tw > window.innerWidth) x = e.clientX - tw - pad;
  if (y + th > window.innerHeight) y = e.clientY - th - pad;
  if (x < 0) x = pad;
  if (y < 0) y = pad;
  tooltip.style.left = x + 'px';
  tooltip.style.top = y + 'px';
}

// セルクリック → ポップアップ
document.addEventListener('click', function(e) {
  const cell = e.target.closest('td.data');
  if (!cell || cell.classList.contains('empty')) return;
  const t1 = cell.dataset.t1;
  const t2 = cell.dataset.t2;
  const img = document.getElementById('overlayImg');
  img.src = 'private_private/' + t1 + '_' + t2 + '.png';
  document.getElementById('overlay').classList.add('active');
  tooltip.style.display = 'none';
});

// has-dataセルのホバー時に行ラベル・列ラベルの文字色を白にする
(function() {
  const table = document.getElementById('mainTable');
  table.addEventListener('mouseenter', function(e) {
    const td = e.target.closest('td.has-data');
    if (!td) return;
    const row = td.parentElement;
    const cellIndex = Array.from(row.children).indexOf(td);
    // 行ラベル
    const rowHeader = row.querySelector('th.row-header');
    if (rowHeader) rowHeader.style.color = '#fff';
    // 列ラベル
    const colHeader = table.querySelector('thead tr').children[cellIndex];
    if (colHeader) colHeader.style.color = '#fff';
  }, true);
  table.addEventListener('mouseleave', function(e) {
    const td = e.target.closest('td.has-data');
    if (!td) return;
    const row = td.parentElement;
    const cellIndex = Array.from(row.children).indexOf(td);
    const rowHeader = row.querySelector('th.row-header');
    if (rowHeader) rowHeader.style.color = '';
    const colHeader = table.querySelector('thead tr').children[cellIndex];
    if (colHeader) colHeader.style.color = '';
  }, true);
})();
</script>
