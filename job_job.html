  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {

    position: relative;

    text-align: center;
    display: flex;
    flex-direction: column;
    height: 100%;
    overflow: hidden;
  }

  h1 {
    font-size: 1.3em;
    margin-bottom: 10px;
    color: #f0f0f0;
    text-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
  }

  .note {
    font-size: 0.85em;
    color: #aaa;
    margin-bottom: 20px;
  }

  /* 凡例 */
  .legend {
    display: inline-flex;
    align-items: center;
    align-self: center;
    gap: 10px;
    margin-bottom: 25px;
    font-size: 0.8em;
    color: #ccc;
  }
  .legend-bar {
    width: 300px;
    height: 16px;
    border-radius: 8px;
    background: linear-gradient(to right,
      hsl(240,80%,50%),
      hsl(200,90%,50%),
      hsl(160,90%,45%),
      hsl(120,80%,45%),
      hsl(60,95%,50%),
      hsl(30,95%,50%),
      hsl(0,85%,50%)
    );
  }

  /* テーブル */
  .table-wrapper {
    width: 100%;
    overflow: auto;
    margin: 0 auto;
    flex: 1;
    min-height: 0;
  }

  table {
    width: 100%;
    border-collapse: separate;
    border-spacing: 0;
    table-layout: fixed;
    margin: 0 auto;
  }

  th, td {
    border: 1px solid rgba(255,255,255,0.1);
    padding: 4px 2px;
    text-align: center;
    vertical-align: middle;
    word-wrap: break-word;
    overflow-wrap: break-word;
  }

  th {
    background: #2e2e4a;
    color: #b0b0d0;
    font-weight: 500;
    font-size: calc(6px + 0.4vw);
    position: sticky;
  }

  thead th {
    top: 0;
    z-index: 10;
  }

  th.row-header {
    background: #2e2e4a;
    position: sticky;
    left: 0;
    z-index: 5;
    min-width: 60px;
  }

  thead th:first-child {
    z-index: 15;
    left: 0;
  }

  td {
    font-size: calc(6px + 0.35vw);
    cursor: default;
    transition: transform 0.15s, box-shadow 0.15s;
    position: relative;
  }

  td.has-data {
    cursor: pointer;
    color: #fff;
    font-weight: 600;
    text-shadow:
      0 0 4px rgba(0,0,0,0.9),
      0 0 8px rgba(0,0,0,0.7),
      0 1px 2px rgba(0,0,0,0.9);
  }

  td.has-data:hover {
    transform: scale(1.05);
    box-shadow: 0 0 12px rgba(255,255,255,0.3);
    z-index: 3;
  }

  td.no-data {
    color: rgba(255,255,255,0.25);
  }

  /* Tooltip */
  .tooltip {
    display: none;
    position: fixed;
    z-index: 1000;
    background: rgba(20, 20, 40, 0.97);
    border: 1px solid rgba(120, 120, 200, 0.5);
    border-radius: 10px;
    padding: 15px 20px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    text-align: left;
    white-space: nowrap;
    max-width: 90vw;
    pointer-events: none;
    backdrop-filter: blur(10px);
  }

  .tooltip.visible {
    display: block;
  }

  .tooltip-title {
    font-size: 1em;
    font-weight: bold;
    color: #a0b0ff;
    margin-bottom: 4px;
  }

  .tooltip-subtitle {
    font-size: 0.8em;
    color: #888;
    margin-bottom: 10px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 8px;
  }

  .tooltip ol {
    margin: 0;
    padding-left: 1.5em;
    color: #ddd;
    font-size: 0.85em;
    line-height: 1.8;
  }

  /* ポップアップ（画像表示） */
  .overlay {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    z-index: 2000;
    cursor: pointer;
    justify-content: center;
    align-items: center;
  }

  .overlay.visible {
    display: flex;
  }

  .overlay img {
    max-width: 90vw;
    max-height: 90vh;
    border-radius: 8px;
    box-shadow: 0 0 40px rgba(0,0,0,0.8);
  }
</style>

// ヒートマップ色計算
function heatColor(value, maxVal) {
  if (value <= 0 || !maxVal) return 'rgba(40,40,60,0.5)';
  // 対数スケールで色を決定（値の範囲が広いため）
  const logVal = Math.log(value + 1);
  const logMax = Math.log(maxVal + 1);
  const ratio = Math.min(logVal / logMax, 1);
  // 青(240) → シアン(180) → 緑(120) → 黄(60) → 赤(0)
  const hue = 240 - ratio * 240;
  const sat = 70 + ratio * 20;
  const light = 35 + ratio * 15;
  return `hsl(${hue}, ${sat}%, ${light}%)`;
}

// テーブル構築
function buildTable() {
  const table = document.getElementById('result-table');

  // 最大値取得
  let maxCount = 0;
  for (const key in SEARCH_RESULTS) {
    const c = parseInt(SEARCH_RESULTS[key].count);
    if (!isNaN(c) && c > maxCount) maxCount = c;
  }
  document.getElementById('legend-max').textContent = maxCount.toLocaleString() + '件';

  // ヘッダー行
  const thead = document.createElement('thead');
  const headerRow = document.createElement('tr');
  const emptyTh = document.createElement('th');
  emptyTh.textContent = '';
  headerRow.appendChild(emptyTh);

  TAG2.forEach(t2 => {
    const th = document.createElement('th');
    th.textContent = t2;
    headerRow.appendChild(th);
  });
  thead.appendChild(headerRow);
  table.appendChild(thead);

  // データ行
  const tbody = document.createElement('tbody');
  TAG1.forEach(t1 => {
    const row = document.createElement('tr');
    const rowHeader = document.createElement('th');
    rowHeader.className = 'row-header';
    rowHeader.textContent = t1;
    row.appendChild(rowHeader);

    TAG2.forEach(t2 => {
      const td = document.createElement('td');

      if (t1 === t2) {
        td.textContent = '';
        td.className = 'no-data';
        td.style.background = 'rgba(255,255,255,0.1)';
        td.style.border = 'none';
      } else {
        const key = `${t1}_${t2}`;
        const result = SEARCH_RESULTS[key];
        const count = result ? result.count : '-';
        const numCount = parseInt(count);
        const hasData = !isNaN(numCount) && numCount > 0;

        td.textContent = hasData ? numCount.toLocaleString() + '件' : count;

        if (hasData) {
          td.className = 'has-data';
          td.style.background = heatColor(numCount, maxCount);
          td.dataset.tag1 = t1;
          td.dataset.tag2 = t2;
          td.dataset.key = key;
          td.dataset.img = result.img || '';

          // クリックで画像ポップアップ
          td.addEventListener('click', function() {
            const img = this.dataset.img;
            if (img) {
              document.getElementById('overlay-img').src = 'job_job/' + img;
              document.getElementById('overlay').classList.add('visible');
            }
          });

          // ホバーでTooltip
          td.addEventListener('mouseenter', showTooltip);
          td.addEventListener('mousemove', moveTooltip);
          td.addEventListener('mouseleave', hideTooltip);
        } else {
          td.className = 'no-data';
          td.style.background = 'rgba(40,40,60,0.3)';
        }
      }

      row.appendChild(td);
    });

    tbody.appendChild(row);
  });
  table.appendChild(tbody);
}

const tooltipEl = document.getElementById('tooltip');

function showTooltip(e) {
  const key = e.target.dataset.key;
  const t1 = e.target.dataset.tag1;
  const t2 = e.target.dataset.tag2;
  const titleData = TITLES[key];

  if (!titleData) return;

  let html = `<div class="tooltip-title">「${t1}」\u3000×\u3000「${t2}」</div>`;
  html += `<div class="tooltip-subtitle">ハウツー本のタイトル（案）</div>`;
  html += '<ol>';
  titleData.titles.forEach(t => {
    html += `<li>${t}</li>`;
  });
  html += '</ol>';

  tooltipEl.innerHTML = html;
  tooltipEl.classList.add('visible');
  moveTooltip(e);
}

function moveTooltip(e) {
  const tt = tooltipEl;
  const pad = 15;
  let x = e.clientX + pad;
  let y = e.clientY + pad;

  // 画面外にはみ出さないよう調整
  const rect = tt.getBoundingClientRect();
  if (x + rect.width > window.innerWidth) {
    x = e.clientX - rect.width - pad;
  }
  if (y + rect.height > window.innerHeight) {
    y = e.clientY - rect.height - pad;
  }

  tt.style.left = x + 'px';
  tt.style.top = y + 'px';
}

function hideTooltip() {
  tooltipEl.classList.remove('visible');
}

buildTable();

// has-dataセルのホバー時に行ラベル・列ラベルの文字色を白にする
(function() {
  const table = document.getElementById('result-table');
  let prevHighlighted = null;

  function clearHighlight() {
    if (!prevHighlighted) return;
    const { rowHeader, colHeader } = prevHighlighted;
    if (rowHeader) rowHeader.style.color = '';
    if (colHeader) colHeader.style.color = '';
    prevHighlighted = null;
  }

  document.addEventListener('mouseover', function(e) {
    const td = e.target.closest('td.has-data');
    if (!td || !table.contains(td)) {
      clearHighlight();
      return;
    }
    clearHighlight();
    const row = td.parentElement;
    const cellIndex = Array.from(row.children).indexOf(td);
    const rowHeader = row.querySelector('th');
    const colHeader = table.querySelector('thead tr').children[cellIndex];
    if (rowHeader) rowHeader.style.color = '#fff';
    if (colHeader) colHeader.style.color = '#fff';
    prevHighlighted = { rowHeader, colHeader };
  });
})();
</script>
